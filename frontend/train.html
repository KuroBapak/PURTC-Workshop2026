<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edge AI Smart Lock — AI Model Training with Live Terminal">
    <title>Edge AI Smart Lock — Training</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-header__title">
                <span class="icon">🔐</span>
                Edge AI Smart Lock
            </div>
            <div id="esp-badge" class="esp-badge disconnected">
                <span class="esp-badge__dot"></span>
                <span>ESP32 Disconnected</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div id="progress-bar" class="progress-bar"></div>

        <!-- Main Content -->
        <main data-step="3">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <h1 class="card__title">AI Model Training</h1>
                <p class="card__subtitle">Train a YOLOv8 classification model on your captured dataset.</p>

                <!-- Pre-Training Summary -->
                <div id="summary-section">
                    <div class="summary-grid" id="summary-grid">
                        <div class="summary-item">
                            <div class="summary-item__value" id="summary-classes">—</div>
                            <div class="summary-item__label">Classes</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-item__value" id="summary-images">—</div>
                            <div class="summary-item__label">Total Images</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-item__value">50</div>
                            <div class="summary-item__label">Max Epochs</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-item__value">Auto</div>
                            <div class="summary-item__label">Batch Size</div>
                        </div>
                    </div>
                </div>

                <!-- Training Action -->
                <div class="text-center mb-3" id="action-area">
                    <button id="btn-train" class="btn btn-primary" style="padding: 14px 40px; font-size: 1rem;">
                        🚀 Start Training
                    </button>
                </div>

                <!-- Live Terminal -->
                <div class="terminal" id="terminal" style="display: none;">
                    <pre id="terminal-output"></pre>
                    <span class="terminal__cursor" id="terminal-cursor"></span>
                </div>

                <!-- Navigation -->
                <div class="btn-group btn-group--between mt-3">
                    <button id="btn-back" class="btn btn-secondary">← Back</button>
                    <button id="btn-next" class="btn btn-success hidden">
                        Next → Test Your Model
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/train.js"></script>
</body>
</html>
