<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edge AI Smart Lock System — Setup and ESP32 Connection">
    <title>Edge AI Smart Lock — Setup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-header__title">
                <span class="icon">🔐</span>
                Edge AI Smart Lock
            </div>
            <div id="esp-badge" class="esp-badge disconnected">
                <span class="esp-badge__dot"></span>
                <span>ESP32 Disconnected</span>
            </div>
        </header>

        <!-- Progress Bar -->
        <div id="progress-bar" class="progress-bar"></div>

        <!-- Main Content -->
        <main data-step="1">
            <div class="card" style="max-width: 560px; margin: 0 auto;">
                <h1 class="card__title">Setup & Connection</h1>
                <p class="card__subtitle">Connect your ESP32 microcontroller to get started, or skip to run in software-only mode.</p>

                <!-- COM Port Selection -->
                <div class="form-group">
                    <label class="form-label">COM Port</label>
                    <div class="input-group">
                        <select id="port-select" class="form-select">
                            <option value="">Scanning for ports...</option>
                        </select>
                        <button id="btn-refresh" class="btn btn-icon" title="Refresh ports">🔄</button>
                    </div>
                </div>

                <!-- Connect Button -->
                <button id="btn-connect" class="btn btn-primary" style="width: 100%;" disabled>
                    Connect
                </button>

                <!-- Connection Status -->
                <div id="connection-status" class="mt-2 text-center text-small hidden"></div>

                <!-- Divider -->
                <div class="divider">OR</div>

                <!-- Skip Hardware -->
                <button id="btn-skip" class="btn btn-secondary" style="width: 100%;">
                    Skip — No Hardware
                </button>
                <p class="text-center text-muted text-small mt-1">
                    Continue without ESP32. All AI features will work, hardware actuation will be simulated.
                </p>

                <!-- Navigation -->
                <div class="btn-group btn-group--center mt-3">
                    <button id="btn-next" class="btn btn-success" disabled>
                        Next → Data Collection
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/setup.js"></script>
</body>
</html>
